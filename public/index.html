<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>LifeOS — 人生をゲーム化する</title>
  <meta name="theme-color" content="#F3F5F9" />
  <!-- テーマを描画前に確定させて、ちらつきを防ぐ -->
  <script>
    try {
      var t = localStorage.getItem("lifeos-theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
      var mc = document.querySelector('meta[name="theme-color"]');
      if (mc) mc.setAttribute("content", t === "dark" ? "#05060A" : "#F3F5F9");
    } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- PC: 左サイドバー -->
  <aside class="sidebar glass" id="sidebar">
    <div class="logo">
      <span class="logo-badge" id="logoBadge"></span>
      <div><strong>LifeOS</strong><span class="logo-sub">人生をゲーム化する</span></div>
    </div>
    <nav id="sideNav"></nav>
    <div class="side-level" id="sideLevel"></div>
  </aside>

  <!-- モバイル: 上部バー -->
  <header class="mobile-top glass">
    <span class="logo-badge sm" id="logoBadgeM"></span>
    <strong>LifeOS</strong>
    <span class="level-chip" id="levelChip"></span>
  </header>

  <main class="main" id="main"></main>

  <!-- モバイル: 下タブナビ -->
  <nav class="bottom-nav glass" id="bottomNav"></nav>

  <!-- 右スライドインのドロワーメニュー -->
  <div id="drawerWrap"></div>

  <div id="toastWrap"></div>
  <div id="modalWrap"></div>

  <script src="icons.js"></script>
  <script src="core.js"></script>
  <script src="views-main.js"></script>
  <script src="views-work.js"></script>
</body>
</html>
